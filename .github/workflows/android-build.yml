name: Android CI/CD Build

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: # Allows manually triggering the build from the Actions tab

jobs:
  build:
    name: Build & Package APK
    runs-on: ubuntu-latest
    env:
      STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Decode Debug Keystore
        run: |
          if [ -f "debug.keystore.base64" ]; then
            echo "Decoding debug keystore..."
            base64 -d debug.keystore.base64 > debug.keystore
          else
            echo "No debug.keystore.base64 found. Running fallback."
          fi

      - name: Set up environment files
        run: |
          touch local.properties
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          if [ ! -f ".env" ]; then
            if [ -f ".env.example" ]; then
              cp .env.example .env
            else
              touch .env
            fi
          fi

      - name: Clean and Restore Gradle Wrapper
        run: |
          echo "Cleaning up possibly corrupted wrapper jar..."
          rm -f gradle/wrapper/gradle-wrapper.jar
          
          echo "Downloading authentic, clean Gradle Wrapper jar from Gradle's official repository..."
          mkdir -p gradle/wrapper
          curl -sSLo gradle/wrapper/gradle-wrapper.jar https://raw.githubusercontent.com/gradle/gradle/v9.3.1/gradle/wrapper/gradle-wrapper.jar || {
            echo "Direct download failed. Falling back to local gradle wizard..."
            gradle wrapper --gradle-version 9.3.1
          }

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Build Release APK (Conditional)
        env:
          KEYSTORE_PATH: ${{ secrets.KEYSTORE_PATH }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ "$STORE_PASSWORD" != "" ]; then
            ./gradlew assembleRelease
          else
            echo "Release credentials not configured. Skipping Release build."
          fi

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: Shield-Blocker-Debug-APK
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Upload Release APK
        if: ${{ env.STORE_PASSWORD != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: Shield-Blocker-Release-APK
          path: app/build/outputs/apk/release/app-release.apk
