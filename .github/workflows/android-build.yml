name: Android CI/CD Build

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: # Allows manually triggering the build from the Actions tab

jobs:
  build:
    name: Build & Package APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Decode Debug Keystore
        run: |
          if [ -f "debug.keystore.base64" ]; then
            echo "Decoding debug keystore..."
            base64 -d debug.keystore.base64 > debug.keystore
          else
            echo "No debug.keystore.base64 found. Running fallback."
          fi

      - name: Set up environment files
        run: |
          touch local.properties
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          if [ ! -f ".env" ]; then
            if [ -f ".env.example" ]; then
              cp .env.example .env
            else
              touch .env
            fi
          fi

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run Unit Tests
        run: ./gradlew testDebugUnitTest --continue

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Build Release APK (Conditional)
        env:
          KEYSTORE_PATH: ${{ secrets.KEYSTORE_PATH }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ "${{ secrets.STORE_PASSWORD }}" != "" ]; then
            ./gradlew assembleRelease
          else
            echo "Release credentials not configured. Skipping Release build."
          fi

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: Shield-Blocker-Debug-APK
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Upload Release APK
        if: "${{ secrets.STORE_PASSWORD != '' }}"
        uses: actions/upload-artifact@v4
        with:
          name: Shield-Blocker-Release-APK
          path: app/build/outputs/apk/release/app-release.apk
